<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SSH Terminal</title>
<link rel="stylesheet" href="css/xterm.css">
<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  overflow: hidden; background: #1e1e1e;
  position: fixed; top: 0; left: 0;
  display: flex; flex-direction: column;
}

/* Toolbar */
#toolbar {
  background: #2d2d2d; height: 36px; min-height: 36px;
  display: flex; align-items: center;
  padding: 2px 4px; gap: 2px;
  overflow-x: auto; overflow-y: hidden;
  flex-shrink: 0; border-bottom: 1px solid #444;
}
#toolbar::-webkit-scrollbar { height: 0; }
.key-btn {
  background: #3a3a3a; color: #ddd; border: 1px solid #555;
  border-radius: 4px; padding: 4px 8px;
  font-size: 11px; font-family: monospace;
  white-space: nowrap; cursor: pointer;
  min-width: 32px; text-align: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  flex-shrink: 0; outline: none;
}
.key-btn:active { background: #555; color: #fff; }
.key-btn.fn { background: #4a3a2a; border-color: #7a5a3a; }
.key-btn.ctrl { background: #2a3a4a; border-color: #3a5a7a; }
.key-btn.arrow { min-width: 28px; padding: 4px 6px; }

/* Terminal */
#terminal-container {
  flex: 1; overflow: hidden; position: relative;
}
#terminal { width: 100%; height: 100%; }
.xterm { padding: 4px; }
#status {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #888; font-size: 12px; pointer-events: none;
}
</style>
</head>
<body>

<div id="toolbar">
  <button class="key-btn ctrl" data-key="ctrl">⌃Ctrl</button>
  <button class="key-btn" data-key="tab">⇥Tab</button>
  <button class="key-btn fn" data-key="escape">⎋Esc</button>
  <button class="key-btn" data-key="/">/</button>
  <button class="key-btn" data-key="-">-</button>
  <button class="key-btn" data-key="~">~</button>
  <button class="key-btn" data-key="|">|</button>
  <button class="key-btn arrow" data-key="up">↑</button>
  <button class="key-btn arrow" data-key="down">↓</button>
  <button class="key-btn arrow" data-key="left">←</button>
  <button class="key-btn arrow" data-key="right">→</button>
  <button class="key-btn fn" data-key="home">Home</button>
  <button class="key-btn fn" data-key="end">End</button>
  <button class="key-btn fn" data-key="pgup">PgUp</button>
  <button class="key-btn fn" data-key="pgdown">PgDn</button>
  <button class="key-btn" data-key="F1">F1</button>
  <button class="key-btn" data-key="F2">F2</button>
  <button class="key-btn" data-key="F10">F10</button>
  <button class="key-btn" data-key="F12">F12</button>
</div>

<div id="terminal-container">
  <div id="terminal"></div>
  <div id="status">正在加载终端...</div>
</div>

<script src="js/xterm.js"></script>
<script src="js/xterm-addon-fit.js"></script>
<script>
(function() {
  var statusEl = document.getElementById('status');
  var wsUrl = '%WS_URL%';
  var ctrlMode = false;
  var ws = null;
  var fitTimer = null;

  try {
    var term = new Terminal({
      cursorBlink: true,
      fontSize: 7,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      scrollback: 5000,
      theme: {
        background: '#1e1e1e', foreground: '#f0f0f0',
        cursor: '#ffffff', cursorAccent: '#1e1e1e',
        selectionBackground: '#264f78'
      }
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    statusEl.style.display = 'none';

    // ===== Core: Fit + Scroll =====
    function fitAndScroll() {
      clearTimeout(fitTimer);
      fitTimer = setTimeout(function() {
        try { fitAddon.fit(); } catch(e) {}
        // Always keep cursor visible at bottom
        try { term.scrollToBottom(); } catch(e) {}
      }, 80);
    }

    // Initial fit
    fitAndScroll();

    // KEY: Use ResizeObserver on the container div
    // This fires when keyboard shows/hides (resize changes container height)
    var container = document.getElementById('terminal-container');
    if (typeof ResizeObserver !== 'undefined') {
      var ro = new ResizeObserver(function() {
        fitAndScroll();
      });
      ro.observe(container);
    }

    // Also listen to visualViewport (more reliable on some devices)
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', fitAndScroll);
      window.visualViewport.addEventListener('scroll', fitAndScroll);
    }

    // Fallback
    window.addEventListener('resize', fitAndScroll);

    // After each data write, ensure we're scrolled to bottom
    term.onData(function(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        if (ctrlMode && data.length === 1) {
          var code = data.charCodeAt(0);
          if (code >= 97 && code <= 122) {
            sendData(String.fromCharCode(code - 96));
            ctrlMode = false;
            updateCtrlBtn();
            return;
          }
        }
        sendData(data);
      }
    });

    // Scroll to bottom after any write
    var origWrite = term.write.bind(term);
    term.write = function(data) {
      origWrite(data);
      try { term.scrollToBottom(); } catch(e) {}
    };

    // ===== WebSocket =====
    function sendData(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        try { ws.send(JSON.stringify({ type: 'data', data: data })); } catch(e) {}
      }
    }

    function connect() {
      statusEl.textContent = '连接中...';
      statusEl.style.display = 'block';
      try {
        ws = new WebSocket(wsUrl);
      } catch(e) {
        term.write('\r\n\x1b[31m[WebSocket 创建失败: ' + e.message + ']\x1b[0m\r\n');
        statusEl.style.display = 'none';
        try { AndroidBridge.onError('WebSocket 创建失败: ' + e.message); } catch(x) {}
        return;
      }

      ws.onopen = function() {
        statusEl.style.display = 'none';
        try { AndroidBridge.onConnected(); } catch(e) {}
        // Send initial size
        try { ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows })); } catch(e) {}
        // Re-fit after connection (in case keyboard was already open)
        setTimeout(fitAndScroll, 300);
      };

      ws.onmessage = function(event) {
        try {
          var msg = JSON.parse(event.data);
          if (msg.type === 'data') { term.write(msg.data); }
          else if (msg.type === 'close') {
            term.write('\r\n\x1b[31m[连接已关闭]\x1b[0m\r\n');
            try { AndroidBridge.onDisconnected(msg.data || 'closed'); } catch(e) {}
          }
          else if (msg.type === 'error') {
            term.write('\r\n\x1b[31m[错误: ' + msg.data + ']\x1b[0m\r\n');
            try { AndroidBridge.onError(msg.data); } catch(e) {}
          }
        } catch(e) { term.write(event.data); }
      };

      ws.onclose = function(event) {
        term.write('\r\n\x1b[31m[连接断开]\x1b[0m\r\n');
        statusEl.style.display = 'none';
        try { AndroidBridge.onDisconnected(event.code + ''); } catch(e) {}
      };

      ws.onerror = function() {
        term.write('\r\n\x1b[31m[WebSocket 错误]\x1b[0m\r\n');
        statusEl.style.display = 'none';
        try { AndroidBridge.onError('WebSocket 连接错误'); } catch(e) {}
      };
    }

    // ===== Toolbar =====
    var keyMap = {
      'tab': '\t', 'escape': '\x1b',
      '/': '/', '-': '-', '~': '~', '|': '|',
      'up': '\x1b[A', 'down': '\x1b[B',
      'right': '\x1b[C', 'left': '\x1b[D',
      'home': '\x1bOH', 'end': '\x1bOF',
      'pgup': '\x1b[5~', 'pgdown': '\x1b[6~',
      'F1': '\x1bOP', 'F2': '\x1bOQ', 'F3': '\x1bOR',
      'F10': '\x1b[21~', 'F12': '\x1b[24~'
    };

    function updateCtrlBtn() {
      var btn = document.querySelector('[data-key="ctrl"]');
      if (btn) {
        btn.style.background = ctrlMode ? '#6a4a2a' : '#2a3a4a';
        btn.style.borderColor = ctrlMode ? '#aa7a3a' : '#3a5a7a';
        btn.style.color = ctrlMode ? '#ffcc00' : '#ddd';
      }
    }

    document.getElementById('toolbar').addEventListener('click', function(e) {
      var btn = e.target.closest('.key-btn');
      if (!btn) return;
      var key = btn.getAttribute('data-key');
      if (key === 'ctrl') { ctrlMode = !ctrlMode; updateCtrlBtn(); return; }
      ctrlMode = false; updateCtrlBtn();
      var seq = keyMap[key];
      if (seq) sendData(seq);
    });

    connect();

  } catch(e) {
    statusEl.textContent = '初始化失败: ' + e.message;
    try { AndroidBridge.onError('初始化失败: ' + e.message); } catch(x) {}
  }
})();
</script>
</body>
</html>
