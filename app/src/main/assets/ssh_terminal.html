<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SSH Terminal</title>
<link rel="stylesheet" href="css/xterm.css">
<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  overflow: hidden; background: #1e1e1e;
  position: fixed; top: 0; left: 0;
}
#terminal {
  width: 100%; height: 52vh;
  background: #1e1e1e;
}
.xterm { padding: 4px; }

/* Toolbar with safe margin from bottom */
#toolbar {
  position: fixed;
  bottom: 8px;
  left: 8px; right: 8px;
  background: #2d2d2d; height: 40px;
  display: flex; align-items: center;
  padding: 3px 6px; gap: 4px;
  overflow-x: auto; overflow-y: hidden;
  border: 1px solid #555;
  border-radius: 8px;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
#toolbar::-webkit-scrollbar { height: 0; }
.key-btn {
  background: #3a3a3a; color: #ddd; border: 1px solid #555;
  border-radius: 4px; padding: 5px 9px;
  font-size: 12px; font-family: monospace;
  white-space: nowrap; cursor: pointer;
  min-width: 34px; text-align: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  flex-shrink: 0; outline: none;
}
.key-btn:active { background: #555; color: #fff; }
.key-btn.fn { background: #4a3a2a; border-color: #7a5a3a; }
.key-btn.ctrl { background: #2a3a4a; border-color: #3a5a7a; }
.key-btn.arrow { min-width: 30px; padding: 5px 7px; }

#status {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #888; font-size: 12px; pointer-events: none;
}
</style>
</head>
<body>

<div id="terminal"></div>
<div id="status">正在加载终端...</div>

<div id="toolbar">
  <button class="key-btn ctrl" data-key="ctrl">⌃Ctrl</button>
  <button class="key-btn" data-key="tab">⇥Tab</button>
  <button class="key-btn fn" data-key="escape">⎋Esc</button>
  <button class="key-btn" data-key="/">/</button>
  <button class="key-btn" data-key="-">-</button>
  <button class="key-btn" data-key="~">~</button>
  <button class="key-btn" data-key="|">|</button>
  <button class="key-btn arrow" data-key="up">↑</button>
  <button class="key-btn arrow" data-key="down">↓</button>
  <button class="key-btn arrow" data-key="left">←</button>
  <button class="key-btn arrow" data-key="right">→</button>
  <button class="key-btn fn" data-key="home">Home</button>
  <button class="key-btn fn" data-key="end">End</button>
  <button class="key-btn fn" data-key="pgup">PgUp</button>
  <button class="key-btn fn" data-key="pgdown">PgDn</button>
  <button class="key-btn" data-key="F1">F1</button>
  <button class="key-btn" data-key="F2">F2</button>
  <button class="key-btn" data-key="F10">F10</button>
  <button class="key-btn" data-key="F12">F12</button>
</div>

<script src="js/xterm.js"></script>
<script src="js/xterm-addon-fit.js"></script>
<script>
(function() {
  var statusEl = document.getElementById('status');
  var termEl = document.getElementById('terminal');
  var wsUrl = '%WS_URL%';
  var ctrlMode = false;
  var ws = null;

  try {
    var term = new Terminal({
      cursorBlink: true, fontSize: 7,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      scrollback: 5000,
      theme: { background:'#1e1e1e', foreground:'#f0f0f0', cursor:'#ffffff', cursorAccent:'#1e1e1e', selectionBackground:'#264f78' }
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(termEl);
    statusEl.style.display = 'none';

    function setupSize() {
      var screenH = window.screen.height;
      termEl.style.height = Math.floor(screenH * 0.52) + 'px';
      setTimeout(function() {
        try { fitAddon.fit(); } catch(e) {}
        try { term.scrollToBottom(); } catch(e) {}
      }, 100);
    }

    setupSize();
    window.addEventListener('resize', setupSize);

    var _w = term.write.bind(term);
    term.write = function(d) { _w(d); try { term.scrollToBottom(); } catch(e) {} };

    function send(d) {
      if (ws && ws.readyState === WebSocket.OPEN)
        try { ws.send(JSON.stringify({type:'data',data:d})); } catch(e) {}
    }

    term.onData(function(d) {
      if (ctrlMode && d.length===1) {
        var c=d.charCodeAt(0);
        if (c>=97&&c<=122) { send(String.fromCharCode(c-96)); ctrlMode=false; updCtrl(); return; }
      }
      send(d);
    });

    function connect() {
      statusEl.style.display='block'; statusEl.textContent='连接中...';
      try { ws=new WebSocket(wsUrl); } catch(e) {
        term.write('\r\n\x1b[31m[连接失败]\x1b[0m\r\n');
        statusEl.style.display='none';
        try { AndroidBridge.onError(e.message); } catch(x) {}
        return;
      }
      ws.onopen=function(){
        statusEl.style.display='none';
        try{AndroidBridge.onConnected();}catch(e){}
        try{ws.send(JSON.stringify({type:'resize',cols:term.cols,rows:term.rows}));}catch(e){}
      };
      ws.onmessage=function(ev){
        try{var m=JSON.parse(ev.data);
          if(m.type==='data')term.write(m.data);
          else if(m.type==='error'){term.write('\r\n\x1b[31m[错误:'+m.data+']\x1b[0m\r\n');try{AndroidBridge.onError(m.data);}catch(e){}}
          else if(m.type==='close'){term.write('\r\n\x1b[31m[关闭]\x1b[0m\r\n');try{AndroidBridge.onDisconnected(m.data||'');}catch(e){}}
        }catch(e){term.write(ev.data);}
      };
      ws.onclose=function(){term.write('\r\n\x1b[31m[断开]\x1b[0m\r\n');try{AndroidBridge.onDisconnected('closed');}catch(e){}};
      ws.onerror=function(){term.write('\r\n\x1b[31m[错误]\x1b[0m\r\n');try{AndroidBridge.onError('ws error');}catch(e){}};
    }

    var KM={tab:'\t',escape:'\x1b','/':'/','-':'-','~':'~','|':'|',
      up:'\x1b[A',down:'\x1b[B',right:'\x1b[C',left:'\x1b[D',
      home:'\x1bOH',end:'\x1bOF',pgup:'\x1b[5~',pgdown:'\x1b[6~',
      F1:'\x1bOP',F2:'\x1bOQ',F3:'\x1bOR',F10:'\x1b[21~',F12:'\x1b[24~'};

    function updCtrl(){
      var b=document.querySelector('[data-key="ctrl"]');
      if(b){b.style.background=ctrlMode?'#6a4a2a':'#2a3a4a';b.style.borderColor=ctrlMode?'#aa7a3a':'#3a5a7a';b.style.color=ctrlMode?'#ffcc00':'#ddd';}
    }

    document.getElementById('toolbar').addEventListener('click',function(e){
      var b=e.target.closest('.key-btn'); if(!b) return;
      var k=b.getAttribute('data-key');
      if(k==='ctrl'){ctrlMode=!ctrlMode;updCtrl();return;}
      ctrlMode=false;updCtrl();
      if(KM[k])send(KM[k]);
    });

    connect();
  } catch(e) { statusEl.textContent='初始化失败: '+e.message; }
})();
</script>
</body>
</html>
